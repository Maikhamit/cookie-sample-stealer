<style>
    * {

    body {

        color: white;

        text-align: center;

    .spinner {
        width: 60px;
        height: 60px;
        border: 6px solid rgba(255,255,255,0.3);
        border-top: 6px solid white;
        border-radius: 50%;
        margin: 0 auto 20px;
        animation: spin 1s linear infinite;
    }

    h1 {
        margin-bottom: 10px;
    }

    p {
        opacity: 0.8;
    }

    @keyframes spin {
        100% {
            transform: rotate(360deg);
        }
